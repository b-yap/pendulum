name: check-diff

# Run on all pull_request related events
on:
  pull_request:
    branches:
      - main

permissions:
  contents: read # this is necessary for the Action to be able to read the contents of the repo

jobs:
  sample:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: ${{ github.event_name == 'pull_request' && 2 || 0 }}
      - name: Get the changes of Amplitude
        id: changed-files
        run: |
          if ${{ github.event_name == 'pull_request' }}; then
              echo "changed_files=$(git diff main HEAD runtime/amplitude/src/lib.rs | xargs)" >> $GITHUB_OUTPUT
          else
              echo "changed_files=$(git diff ${{ github.event.before }} ${{ github.event.after }} runtime/amplitude/src/lib.rs | xargs)" >> $GITHUB_OUTPUT
          fi
      - name: Check if there's a change of the spec version
        run: if [$(grep -o -i "spec_version" $GITHUB_OUTPUT | wc -l) -gt 1]
            then
                echo "There's a change of the spec version."
            fi
