name: Parachain Upgrade

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed

jobs:
  javascript:
    name: Run script to upgrade the parachain and upload this preimage
    strategy:
      matrix:
        chain: ["amplitude", "pendulum"]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}
          fetch-depth: 0

      - name: Download artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: release.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: ${{ matrix.chain }}-runtime.zip

      - name: unzip artifact
        run: |
          rm -r ${{ matrix.chain }}-runtime
          filename=$(basename -s .zip *.zip)
          echo "filename: " filename
          unzip *.zip
          rm *.zip
          mv $filename temp
          mv temp/out/* .
          rm -r temp


      - name: run script
        uses: actions/setup-node@v4
        with:
          node-version: '21.x'
      - run: npm install
      - run: |
          node --version
          node .github/scripts/parachain_upgrade_add_preimage.js ${{ matrix.chain }} ${{ matrix.chain }}_runtime.compact.compressed.wasm
